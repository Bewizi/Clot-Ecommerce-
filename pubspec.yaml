name: clot
description: Ecommerce Mobile App
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  bloc: ^9.2.0
  device_preview: ^1.3.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.4
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  supabase_flutter: ^2.12.4

dev_dependencies:
  bloc_lint: ^0.4.0
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.23
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  go_router_builder: ^4.2.1
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#8E6CEF"
  adaptive_icon_foreground: "assets/logo_foreground.png"
